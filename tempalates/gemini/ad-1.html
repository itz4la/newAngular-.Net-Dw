<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frosted Day Admin Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind Config for Custom Colors/Fonts -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        glass: {
                            border: 'rgba(255, 255, 255, 0.8)',
                            surface: 'rgba(255, 255, 255, 0.65)',
                            highlight: 'rgba(255, 255, 255, 0.9)',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            /* Smooth scrolling */
            scroll-behavior: smooth;
        }

        /* Ambient Background Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }

        .orb-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: #ffe4e6;
            animation-delay: 0s;
        }

        /* Rose */
        .orb-2 {
            bottom: -10%;
            right: -10%;
            width: 40vw;
            height: 40vw;
            background: #e0e7ff;
            animation-delay: -2s;
        }

        /* Indigo */
        .orb-3 {
            top: 40%;
            left: 40%;
            width: 30vw;
            height: 30vw;
            background: #eff6ff;
            animation-delay: -4s;
        }

        /* Blue */

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(30px, 50px);
            }
        }

        /* Glass Utility Class */
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        /* Skeleton Loading Animation */
        .skeleton {
            background: linear-gradient(90deg,
                    rgba(202,202,202, 0.4) 25%,
                    rgba(202,202,202, 0.8) 50%,
                    rgba(202,202,202, 0.4) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.375rem;
            /* rounded-md */
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Fade In Animation for Content */
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.8);
        }
    </style>
</head>

    <script>
        // --- Setup & Utilities ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadView('dashboard'); // Initial Load
            setupMobileMenu();
        });

        // --- State Management ---
        const state = {
            currentView: '',
            isLoading: false
        };

        const titles = {
            'dashboard': 'Dashboard Overview',
            'users': 'User Management',
            'products': 'Product Inventory',
            'orders': 'Order History',
            'settings': 'System Settings'
        };

        // --- Core Logic: Load View with Skeleton Simulation ---
        function loadView(viewName) {
            if (state.isLoading || state.currentView === viewName) return;

            state.isLoading = true;
            state.currentView = viewName;

            // Update UI Sidebar Active State
            updateSidebar(viewName);

            // Update Page Title
            document.getElementById('page-title').textContent = titles[viewName] || 'Overview';

            // 1. Inject Skeleton
            const contentArea = document.getElementById('content-area');
            const skeletonId = `tmpl-${['orders', 'settings'].includes(viewName) ? 'generic' : viewName}-skeleton`;
            const skeletonTemplate = document.getElementById(skeletonId) || document.getElementById('tmpl-generic-skeleton');

            contentArea.innerHTML = '';
            contentArea.appendChild(skeletonTemplate.content.cloneNode(true));
            lucide.createIcons(); // In case skeletons have icons (though usually shapes)

            // 2. Simulate Network Delay (800ms)
            setTimeout(() => {
                // 3. Inject Actual Content
                const templateId = `tmpl-${['orders', 'settings'].includes(viewName) ? 'generic' : viewName}`;
                const contentTemplate = document.getElementById(templateId);

                contentArea.innerHTML = '';
                contentArea.appendChild(contentTemplate.content.cloneNode(true));

                // Re-init icons for new content
                lucide.createIcons();

                state.isLoading = false;
            }, 800);

            // Close mobile menu if open
            closeMobileMenu();
        }

        // --- UI Logic ---
        function updateSidebar(activeView) {
            const buttons = document.querySelectorAll('.nav-item');

            buttons.forEach(btn => {
                // Check if this button calls the activeView
                const onclickAttr = btn.getAttribute('onclick');
                const isTarget = onclickAttr && onclickAttr.includes(`'${activeView}'`);

                if (isTarget) {
                    // Active Styles
                    btn.className = 'nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200 text-indigo-700 bg-indigo-50/50 shadow-sm border border-indigo-100';
                } else {
                    // Inactive Styles
                    btn.className = 'nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-600 hover:bg-white/60 hover:text-indigo-600 transition-all duration-200';
                }
            });
        }

        // --- Mobile Menu Handling ---
        function setupMobileMenu() {
            const btn = document.getElementById('mobile-menu-btn');
            const closeBtn = document.getElementById('close-mobile-menu');
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('mobile-overlay');
            const navContainer = document.getElementById('mobile-nav-container');

            // Clone desktop nav items to mobile
            const desktopNav = document.querySelector('aside nav').innerHTML;
            navContainer.innerHTML = desktopNav;

            function open() {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            }

            function close() {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }

            btn.addEventListener('click', open);
            closeBtn.addEventListener('click', close);
            overlay.addEventListener('click', close);

            // Expose close globally for the loadView function
            window.closeMobileMenu = close;
        }

    </script>
