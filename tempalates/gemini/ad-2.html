<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | FrostUI Admin</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Glassmorphism Utilities */
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .glass-sidebar {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.8);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 1);
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: #6366f1;
            /* Indigo-500 */
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.4);
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-rose-50 via-indigo-50 to-blue-50 text-slate-800 h-screen overflow-hidden selection:bg-indigo-200">

    <!-- Decorative Background Blobs -->
    <div
        class="fixed top-0 left-0 w-96 h-96 bg-indigo-300/30 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2 pointer-events-none">
    </div>
    <div
        class="fixed bottom-0 right-0 w-96 h-96 bg-rose-300/30 rounded-full blur-3xl translate-x-1/2 translate-y-1/2 pointer-events-none">
    </div>

    <div class="flex h-full relative z-10">

        <!-- Sidebar -->
        <aside class="w-20 lg:w-64 glass-sidebar flex flex-col justify-between transition-all duration-300 z-50">
            <div>
                <div class="h-20 flex items-center justify-center lg:justify-start lg:px-6 border-b border-white/50">
                    <div
                        class="w-8 h-8 rounded-lg bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30 text-white">
                        <i data-lucide="hexagon" class="w-5 h-5"></i>
                    </div>
                    <span class="ml-3 font-bold text-xl text-slate-800 hidden lg:block tracking-tight">FrostUI</span>
                </div>

                <nav class="p-4 space-y-2">
                    <a href="index.html"
                        class="nav-btn w-full flex items-center p-3 rounded-xl transition-all duration-200 group text-slate-500 hover:bg-white/50 hover:text-indigo-600">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                        <span class="ml-3 hidden lg:block">Dashboard</span>
                    </a>

                    <a href="#"
                        class="nav-btn w-full flex items-center p-3 rounded-xl transition-all duration-200 group text-slate-500 hover:bg-white/50 hover:text-indigo-600">
                        <i data-lucide="users" class="w-5 h-5"></i>
                        <span class="ml-3 hidden lg:block">Users</span>
                    </a>

                    <!-- Active State for Products -->
                    <a href="#"
                        class="nav-btn w-full flex items-center p-3 rounded-xl transition-all duration-200 group bg-white/80 shadow-sm text-indigo-600 font-medium">
                        <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                        <span class="ml-3 hidden lg:block">Products</span>
                    </a>

                    <a href="#"
                        class="nav-btn w-full flex items-center p-3 rounded-xl transition-all duration-200 group text-slate-500 hover:bg-white/50 hover:text-indigo-600">
                        <i data-lucide="package" class="w-5 h-5"></i>
                        <span class="ml-3 hidden lg:block">Orders</span>
                    </a>

                    <a href="#"
                        class="nav-btn w-full flex items-center p-3 rounded-xl transition-all duration-200 group text-slate-500 hover:bg-white/50 hover:text-indigo-600">
                        <i data-lucide="tags" class="w-5 h-5"></i>
                        <span class="ml-3 hidden lg:block">Categories</span>
                    </a>
                </nav>
            </div>

            <div class="p-4 border-t border-white/50">
                <button
                    class="w-full flex items-center p-3 rounded-xl text-slate-500 hover:bg-white/50 hover:text-indigo-600 transition-all">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    <span class="ml-3 font-medium hidden lg:block">Settings</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full overflow-hidden">

            <!-- Top Header -->
            <header class="h-20 glass-card m-4 mb-0 rounded-2xl flex items-center justify-between px-6 shrink-0 z-20">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="p-2 hover:bg-white/50 rounded-full text-slate-500 transition-colors">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    </a>
                    <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Add Product</h1>
                </div>

                <div class="flex items-center gap-4">
                    <button
                        class="px-4 py-2 text-slate-600 font-medium hover:text-rose-600 transition-colors">Cancel</button>
                    <button
                        class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl shadow-lg shadow-indigo-500/20 transition-all flex items-center gap-2">
                        <i data-lucide="check" class="w-4 h-4"></i> Save Product
                    </button>
                </div>
            </header>

            <!-- Scrollable Content Area -->
            <div class="flex-1 overflow-y-auto p-4 scroll-smooth">

                <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6 fade-in">

                    <!-- Left Column: Main Information -->
                    <div class="lg:col-span-2 space-y-6">

                        <!-- General Info Card -->
                        <div class="glass-card p-6 rounded-2xl">
                            <h3 class="text-lg font-bold text-slate-800 mb-4">General Information</h3>

                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-slate-600 mb-1">Product Name</label>
                                    <input type="text" placeholder="e.g. Wireless Noise-Canceling Headphones"
                                        class="w-full glass-input rounded-xl px-4 py-2.5 text-slate-800 outline-none transition-all">
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-slate-600 mb-1">Description</label>
                                    <div class="w-full glass-input rounded-xl overflow-hidden">
                                        <!-- Mock Toolbar -->
                                        <div
                                            class="flex items-center gap-2 px-3 py-2 border-b border-white/50 bg-white/30 text-slate-500">
                                            <button class="p-1 hover:bg-white/50 rounded"><i data-lucide="bold"
                                                    class="w-4 h-4"></i></button>
                                            <button class="p-1 hover:bg-white/50 rounded"><i data-lucide="italic"
                                                    class="w-4 h-4"></i></button>
                                            <button class="p-1 hover:bg-white/50 rounded"><i data-lucide="underline"
                                                    class="w-4 h-4"></i></button>
                                            <div class="w-px h-4 bg-slate-300 mx-1"></div>
                                            <button class="p-1 hover:bg-white/50 rounded"><i data-lucide="list"
                                                    class="w-4 h-4"></i></button>
                                            <button class="p-1 hover:bg-white/50 rounded"><i data-lucide="link"
                                                    class="w-4 h-4"></i></button>
                                        </div>
                                        <textarea rows="5" class="w-full bg-transparent p-4 outline-none resize-none"
                                            placeholder="Write a description..."></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Pricing Card -->
                        <div class="glass-card p-6 rounded-2xl">
                            <h3 class="text-lg font-bold text-slate-800 mb-4">Pricing</h3>

                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-slate-600 mb-1">Base Price</label>
                                    <div class="relative">
                                        <div
                                            class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                            $</div>
                                        <input type="number" placeholder="0.00"
                                            class="w-full glass-input rounded-xl pl-8 pr-4 py-2.5 text-slate-800 outline-none transition-all">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-600 mb-1">Discount Price</label>
                                    <div class="relative">
                                        <div
                                            class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                            $</div>
                                        <input type="number" placeholder="0.00"
                                            class="w-full glass-input rounded-xl pl-8 pr-4 py-2.5 text-slate-800 outline-none transition-all">
                                    </div>
                                </div>
                            </div>

                            <div class="mt-4 flex items-center gap-2">
                                <input type="checkbox" id="tax"
                                    class="w-4 h-4 rounded text-indigo-600 focus:ring-indigo-500 border-gray-300">
                                <label for="tax" class="text-sm text-slate-600 select-none cursor-pointer">Charge tax on
                                    this product</label>
                            </div>
                        </div>

                        <!-- Inventory Card -->
                        <div class="glass-card p-6 rounded-2xl">
                            <h3 class="text-lg font-bold text-slate-800 mb-4">Inventory</h3>

                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-slate-600 mb-1">SKU</label>
                                    <input type="text" placeholder="e.g. AUD-001"
                                        class="w-full glass-input rounded-xl px-4 py-2.5 text-slate-800 outline-none transition-all">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-600 mb-1">Barcode (ISBN)</label>
                                    <input type="text" placeholder="0000-0000"
                                        class="w-full glass-input rounded-xl px-4 py-2.5 text-slate-800 outline-none transition-all">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-600 mb-1">Quantity</label>
                                    <input type="number" placeholder="0"
                                        class="w-full glass-input rounded-xl px-4 py-2.5 text-slate-800 outline-none transition-all">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column: Sidebar Options -->
                    <div class="space-y-6">

                        <!-- Media Upload -->
                        <div class="glass-card p-6 rounded-2xl">
                            <h3 class="text-lg font-bold text-slate-800 mb-4">Product Media</h3>

                            <div
                                class="border-2 border-dashed border-indigo-200 rounded-xl p-6 flex flex-col items-center justify-center text-center cursor-pointer hover:bg-white/30 transition-colors group">
                                <div
                                    class="w-12 h-12 rounded-full bg-indigo-50 text-indigo-500 flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                                    <i data-lucide="upload-cloud" class="w-6 h-6"></i>
                                </div>
                                <p class="text-sm font-medium text-slate-700">Click to upload image</p>
                                <p class="text-xs text-slate-400 mt-1">or drag and drop here</p>
                            </div>

                            <!-- Thumbnail Previews -->
                            <div class="grid grid-cols-3 gap-2 mt-4">
                                <div
                                    class="aspect-square rounded-lg bg-slate-100 relative group overflow-hidden border border-white/50">
                                    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=150&q=80"
                                        class="w-full h-full object-cover">
                                    <div
                                        class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button class="text-white hover:text-rose-400"><i data-lucide="trash-2"
                                                class="w-4 h-4"></i></button>
                                    </div>
                                </div>
                                <div
                                    class="aspect-square rounded-lg bg-slate-100 border border-dashed border-slate-300 flex items-center justify-center text-slate-400 hover:text-indigo-500 hover:border-indigo-300 cursor-pointer transition-colors">
                                    <i data-lucide="plus" class="w-5 h-5"></i>
                                </div>
                            </div>
                        </div>

                        <!-- Organization -->
                        <div class="glass-card p-6 rounded-2xl">
                            <h3 class="text-lg font-bold text-slate-800 mb-4">Organization</h3>

                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-slate-600 mb-1">Status</label>
                                    <select
                                        class="w-full glass-input rounded-xl px-4 py-2.5 text-slate-800 outline-none transition-all cursor-pointer">
                                        <option value="published">Published</option>
                                        <option value="draft">Draft</option>
                                        <option value="scheduled">Scheduled</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-slate-600 mb-1">Category</label>
                                    <select
                                        class="w-full glass-input rounded-xl px-4 py-2.5 text-slate-800 outline-none transition-all cursor-pointer">
                                        <option>Select Category...</option>
                                        <option>Electronics</option>
                                        <option>Clothing</option>
                                        <option>Home & Garden</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-slate-600 mb-1">Tags</label>
                                    <input type="text" placeholder="Add tags..."
                                        class="w-full glass-input rounded-xl px-4 py-2.5 text-slate-800 outline-none transition-all">
                                    <div class="flex flex-wrap gap-2 mt-2">
                                        <span
                                            class="px-2 py-1 bg-white/50 border border-white rounded-md text-xs text-slate-600 flex items-center gap-1">
                                            Wireless <i data-lucide="x"
                                                class="w-3 h-3 cursor-pointer hover:text-rose-500"></i>
                                        </span>
                                        <span
                                            class="px-2 py-1 bg-white/50 border border-white rounded-md text-xs text-slate-600 flex items-center gap-1">
                                            Audio <i data-lucide="x"
                                                class="w-3 h-3 cursor-pointer hover:text-rose-500"></i>
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="h-10"></div> <!-- Bottom Spacer -->
            </div>
        </main>
    </div>

    <!-- Vanilla JS Logic -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>

</html>
