<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Library | Libris</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        forest: {
                            50: '#f2fcf5',
                            100: '#e1f8e8',
                            800: '#1c4a33', // Primary Brand Color
                            900: '#143625',
                        },
                        stone: {
                            50: '#fafaf9',
                            100: '#f5f5f4',
                            200: '#e7e5e4',
                            300: '#d6d3d1',
                            800: '#292524',
                            900: '#1c1917',
                        },
                        gold: {
                            500: '#d4a373',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="text-stone-800 antialiased font-sans bg-stone-50 h-screen overflow-hidden">

    <div class="flex min-h-full">

        <!-- Left Column: Visual (Hidden on mobile) -->
        <div class="hidden lg:flex lg:w-1/2 relative bg-forest-900 overflow-hidden">
            <!-- Background Image -->
            <div class="absolute inset-0">
                <!-- Using a new image for the register page to differentiate it -->
                <div
                    class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1481627834876-b7833e8f5570?q=80&w=2228&auto=format&fit=crop')] bg-cover bg-center opacity-40 mix-blend-overlay">
                </div>
                <div class="absolute inset-0 bg-gradient-to-t from-forest-900 via-forest-900/40 to-transparent"></div>
            </div>

            <!-- Content Overlay -->
            <div class="relative z-10 w-full flex flex-col justify-between p-12 text-white">
                <div class="flex items-center gap-2 text-white/80">
                    <i data-lucide="library" class="w-6 h-6"></i>
                    <span class="font-serif font-bold tracking-wide">Libris</span>
                </div>

                <div class="mb-12">
                    <i data-lucide="quote" class="w-8 h-8 text-gold-500 mb-4 opacity-80 fill-current"></i>
                    <h2 class="font-serif text-4xl md:text-5xl leading-tight font-medium mb-6">
                        "The journey of a lifetime starts with the turning of a page."
                    </h2>
                    <div class="flex items-center gap-3">
                        <div class="h-px w-8 bg-gold-500"></div>
                        <span class="text-stone-300 tracking-wide uppercase text-sm">Rachel Anders</span>
                    </div>
                </div>

                <div class="text-xs text-forest-100/40">
                    © 2024 Libris Inc. Photographed by P. Tomar.
                </div>
            </div>
        </div>

        <!-- Right Column: Form -->
        <div class="w-full lg:w-1/2 flex flex-col justify-center px-4 sm:px-6 lg:px-20 xl:px-24 bg-stone-50 relative">

            <!-- Mobile Logo -->
            <div class="lg:hidden absolute top-8 left-6 flex items-center gap-2 text-forest-800">
                <i data-lucide="library" class="w-6 h-6"></i>
                <span class="font-serif font-bold text-xl">Libris</span>
            </div>

            <div class="w-full max-w-sm mx-auto">
                <div class="mb-8">
                    <h1 class="font-serif text-3xl font-bold text-stone-900 mb-2">Create an account</h1>
                    <p class="text-stone-500">Start your reading journey today.</p>
                </div>

                <form class="space-y-5" action="#" method="POST">
                    <!-- Name -->
                    <div>
                        <label for="name" class="block text-sm font-medium text-stone-700 mb-1">Full Name</label>
                        <div class="relative">
                            <input type="text" id="name" name="name"
                                class="block w-full rounded-lg border-stone-300 shadow-sm focus:border-forest-800 focus:ring-forest-800 sm:text-sm pl-10 py-3 bg-white"
                                placeholder="John Doe">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="user" class="h-5 w-5 text-stone-400"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-stone-700 mb-1">Email address</label>
                        <div class="relative">
                            <input type="email" id="email" name="email"
                                class="block w-full rounded-lg border-stone-300 shadow-sm focus:border-forest-800 focus:ring-forest-800 sm:text-sm pl-10 py-3 bg-white"
                                placeholder="you@example.com">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="mail" class="h-5 w-5 text-stone-400"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Password -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-stone-700 mb-1">Password</label>
                        <div class="relative">
                            <input type="password" id="password" name="password"
                                class="block w-full rounded-lg border-stone-300 shadow-sm focus:border-forest-800 focus:ring-forest-800 sm:text-sm pl-10 py-3 bg-white"
                                placeholder="Create a password">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="lock" class="h-5 w-5 text-stone-400"></i>
                            </div>
                        </div>
                        <p class="mt-1 text-xs text-stone-500">Must be at least 8 characters.</p>
                    </div>

                    <!-- Terms -->
                    <div class="flex items-start">
                        <div class="flex items-center h-5">
                            <input id="terms" name="terms" type="checkbox"
                                class="h-4 w-4 text-forest-800 focus:ring-forest-800 border-stone-300 rounded cursor-pointer">
                        </div>
                        <div class="ml-2 text-sm">
                            <label for="terms" class="text-stone-500">I agree to the <a href="#"
                                    class="text-forest-800 hover:underline">Terms of Service</a> and <a href="#"
                                    class="text-forest-800 hover:underline">Privacy Policy</a>.</label>
                        </div>
                    </div>

                    <!-- Button -->
                    <div>
                        <button type="button"
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-medium text-white bg-forest-800 hover:bg-forest-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-forest-800 transition-all transform active:scale-95">
                            Create account
                        </button>
                    </div>
                </form>

                <!-- Social Divider -->
                <div class="mt-8">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-stone-200"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-2 bg-stone-50 text-stone-500">Or sign up with</span>
                        </div>
                    </div>

                    <div class="mt-6 grid grid-cols-2 gap-3">
                        <button type="button"
                            class="w-full inline-flex justify-center py-2.5 px-4 border border-stone-200 rounded-xl shadow-sm bg-white text-sm font-medium text-stone-600 hover:bg-stone-50 hover:text-stone-900 transition-colors">
                            <svg class="h-5 w-5" aria-hidden="true" viewBox="0 0 24 24">
                                <path
                                    d="M12.0003 20.45C16.667 20.45 20.584 17.272 20.584 12.336C20.584 11.753 20.487 11.196 20.324 10.668H12.0003V13.824H16.8123C16.603 14.927 15.342 16.92 12.0003 16.92C9.28898 16.92 6.99298 15.087 6.17398 12.636C5.96298 12.004 5.84998 11.328 5.84998 10.632C5.84998 9.936 5.96298 9.26 6.17398 8.628C6.99298 6.176 9.28898 4.344 12.0003 4.344C13.5323 4.344 14.908 4.876 15.989 5.908L18.468 3.428C16.745 1.82 14.524 0.816 12.0003 0.816C7.26098 0.816 3.16398 3.516 1.15998 7.508C0.32898 9.164 0.14298 10.872 0.14298 10.632C0.14298 10.392 0.32898 12.1 1.15998 13.756C3.16398 17.748 7.26098 20.45 12.0003 20.45Z"
                                    fill="#4285F4" fill-rule="evenodd" fill-opacity="1" />
                            </svg>
                            <span class="ml-2">Google</span>
                        </button>

                        <button type="button"
                            class="w-full inline-flex justify-center py-2.5 px-4 border border-stone-200 rounded-xl shadow-sm bg-white text-sm font-medium text-stone-600 hover:bg-stone-50 hover:text-stone-900 transition-colors">
                            <svg class="h-5 w-5 text-stone-900" aria-hidden="true" fill="currentColor"
                                viewBox="0 0 24 24">
                                <path
                                    d="M17.05 20.28c-.98.95-2.05.88-3.08.4-.52-.25-1.07-.47-1.57-.47-.53 0-1.12.24-1.68.49-1.01.45-2.11.49-3.05-.51C5.55 17.9 3.97 13.75 5.58 10.8c.84-1.55 2.29-2.52 3.86-2.54 1.19-.01 2.11.45 2.76.45.62 0 1.76-.48 3.01-.43 1.25.04 2.37.56 3.06 1.54-2.65 1.57-2.17 5.17.41 6.32-.47 1.41-1.11 2.75-1.63 3.14zm-4.13-13.2c.47-1.15 1.76-1.89 2.89-1.89.16 1.25-.8 2.68-1.92 3.16-.97.43-2.11-.19-2.31-1.27h1.34z">
                                </path>
                            </svg>
                            <span class="ml-2">Apple</span>
                        </button>
                    </div>
                </div>

                <!-- Footer -->
                <p class="mt-8 text-center text-sm text-stone-500">
                    Already have an account?
                    <a href="login.html"
                        class="font-semibold text-forest-800 hover:text-forest-900 underline underline-offset-2">Sign
                        in</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
