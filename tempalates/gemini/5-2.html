<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Libris</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        libris: {
                            stone: '#fafaf9',   /* Warm Stone */
                            cream: '#f5f5f4',   /* Soft Cream */
                            green: '#1c4a33',   /* Deep Forest Green */
                            greenLight: '#2a6b4a',
                            charcoal: '#374151',/* Charcoal Gray */
                            gold: '#d4a373',    /* Muted Gold */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    backgroundImage: {
                        'library-mood': "url('https://images.unsplash.com/photo-1507842217121-9d5961143686?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80')",
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #fafaf9;
        }
    </style>
</head>

<body class="h-screen flex flex-col md:flex-row overflow-hidden font-sans text-libris-charcoal">

    <!-- Left Side: Brand Visual (Hidden on small mobile, visible on md+) -->
    <div class="hidden md:flex md:w-1/2 bg-libris-green relative overflow-hidden">
        <!-- Background Image -->
        <div class="absolute inset-0 bg-library-mood bg-cover bg-center mix-blend-overlay opacity-40"></div>

        <!-- Gradient Overlay for Readability -->
        <div class="absolute inset-0 bg-gradient-to-t from-libris-green/90 via-libris-green/50 to-libris-green/30">
        </div>

        <!-- Content -->
        <div class="relative z-10 flex flex-col justify-between h-full p-12 text-white">
            <div class="flex items-center gap-2">
                <i data-lucide="library" size="24" class="text-libris-gold"></i>
                <span class="font-serif text-2xl font-bold tracking-tight">Libris</span>
            </div>

            <div class="max-w-md">
                <i data-lucide="quote" size="40" class="text-libris-gold/50 mb-6 rotate-180"></i>
                <h2 class="font-serif text-4xl md:text-5xl font-bold leading-tight mb-6">
                    "Reading is dreaming with open eyes."
                </h2>
                <p class="font-light text-white/80 text-lg tracking-wide">— Unknown</p>
            </div>

            <div class="flex gap-4 text-sm text-white/60">
                <span>© 2024 Libris</span>
                <span class="w-px h-4 bg-white/20"></span>
                <a href="#" class="hover:text-white transition-colors">Privacy</a>
                <a href="#" class="hover:text-white transition-colors">Terms</a>
            </div>
        </div>
    </div>

    <!-- Right Side: Login Form -->
    <div class="w-full md:w-1/2 flex flex-col justify-center items-center p-8 bg-libris-stone relative overflow-y-auto">
        <!-- Mobile Header (Logo) -->
        <div class="md:hidden absolute top-8 left-8 flex items-center gap-2 text-libris-green">
            <i data-lucide="library" size="24"></i>
            <span class="font-serif text-2xl font-bold tracking-tight">Libris</span>
        </div>

        <div class="w-full max-w-md space-y-8">
            <div class="text-center md:text-left">
                <h1 class="font-serif text-3xl md:text-4xl font-bold text-libris-charcoal mb-2">Welcome Back</h1>
                <p class="text-gray-500">Please enter your details to access your library.</p>
            </div>

            <form class="space-y-6" onsubmit="event.preventDefault();">
                <!-- Email Input -->
                <div class="space-y-2">
                    <label for="email" class="text-sm font-medium text-gray-700 block">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i data-lucide="mail" size="18"></i>
                        </div>
                        <input type="email" id="email"
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-libris-green focus:border-libris-green bg-white transition-all placeholder-gray-300"
                            placeholder="reader@example.com">
                    </div>
                </div>

                <!-- Password Input -->
                <div class="space-y-2">
                    <label for="password" class="text-sm font-medium text-gray-700 block">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i data-lucide="lock" size="18"></i>
                        </div>
                        <input type="password" id="password"
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-libris-green focus:border-libris-green bg-white transition-all placeholder-gray-300"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox"
                            class="h-4 w-4 text-libris-green focus:ring-libris-green border-gray-300 rounded cursor-pointer">
                        <label for="remember-me"
                            class="ml-2 block text-sm text-gray-600 cursor-pointer select-none">Remember me</label>
                    </div>
                    <div class="text-sm">
                        <a href="#"
                            class="font-medium text-libris-green hover:text-libris-greenLight hover:underline">Forgot
                            password?</a>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-libris-green hover:bg-libris-greenLight focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-libris-green transition-all transform active:scale-[0.98]">
                    Sign In
                </button>
            </form>

            <!-- Social Auth -->
            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-libris-stone text-gray-500">Or continue with</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button
                    class="flex items-center justify-center px-4 py-2.5 border border-gray-300 rounded-lg shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                    <svg class="h-5 w-5 mr-2" viewBox="0 0 24 24">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Google
                </button>
                <button
                    class="flex items-center justify-center px-4 py-2.5 border border-gray-300 rounded-lg shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                    <svg class="h-5 w-5 mr-2 text-black" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.74 3.4 1.86-2.93 1.75-2.46 6.09.43 7.28-.67 1.65-1.57 3.25-2.48 3.87zm-1.87-14.28c-.73-1.04-.45-2.5.85-3.64.92-.83 2.59-1.34 3.29-.35.83 1.15.54 2.76-.79 3.85-1.09.89-2.67 1.05-3.35.14z" />
                    </svg>
                    Apple
                </button>
            </div>

            <!-- Footer -->
            <p class="text-center text-sm text-gray-600">
                Don't have an account?
                <a href="#" class="font-medium text-libris-green hover:text-libris-greenLight hover:underline">Join the
                    library</a>
            </p>

            <!-- Back to Home -->
            <div class="pt-6 text-center border-t border-gray-200 md:hidden">
                <a href="index.html"
                    class="inline-flex items-center text-sm text-gray-500 hover:text-libris-green transition-colors">
                    <i data-lucide="arrow-left" size="16" class="mr-1"></i> Back to Home
                </a>
            </div>
        </div>

        <!-- Desktop Back to Home (Absolute) -->
        <a href="index.html"
            class="hidden md:inline-flex absolute top-8 right-8 items-center text-sm text-gray-400 hover:text-libris-green transition-colors">
            Back to Home <i data-lucide="arrow-right" size="16" class="ml-1"></i>
        </a>
    </div>

    <!-- Scripts -->
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
