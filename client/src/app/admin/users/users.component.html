<!-- USERS VIEW -->
<template id="tmpl-users">
  <div class="glass-panel rounded-2xl overflow-hidden fade-in">
    <div class="p-5 border-b border-glass-border flex justify-between items-center">
      <div class="relative w-64">
        <i data-lucide="search" class="absolute left-3 top-2.5 text-slate-400" size="18"></i>
        <input type="text" placeholder="Search users..."
          class="w-full pl-10 pr-4 py-2 rounded-xl bg-white/40 border border-white/60 focus:ring-2 focus:ring-indigo-500 focus:bg-white/70 outline-none transition-all text-sm text-slate-700">
      </div>
      <button
        class="px-4 py-2 bg-white/50 hover:bg-white/80 border border-white/80 rounded-xl text-slate-600 text-sm font-medium transition-colors">
        Filters <i data-lucide="filter" size="14" class="inline ml-1"></i>
      </button>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left text-sm text-slate-600">
        <thead class="bg-indigo-50/30 text-xs uppercase font-semibold text-slate-500">
          <tr>
            <th class="px-6 py-4">User</th>
            <th class="px-6 py-4">Status</th>
            <th class="px-6 py-4">Role</th>
            <th class="px-6 py-4">Joined</th>
            <th class="px-6 py-4 text-right">Action</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-indigo-50/50">
          <tr class="hover:bg-indigo-50/30 transition-colors group">
            <td class="px-6 py-4 flex items-center gap-3">
              <img src="https://ui-avatars.com/api/?name=Emma+W&background=random" class="w-9 h-9 rounded-full">
              <div>
                <div class="font-medium text-slate-800">Emma Watson</div>
                <div class="text-xs text-slate-500">emma&#64;example.com</div>
              </div>
            </td>
            <td class="px-6 py-4"><span
                class="px-2 py-1 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-600">Active</span>
            </td>
            <td class="px-6 py-4">Admin</td>
            <td class="px-6 py-4">Oct 24, 2023</td>
            <td class="px-6 py-4 text-right">
              <button class="text-slate-400 hover:text-indigo-600"><i data-lucide="more-horizontal"
                  size="18"></i></button>
            </td>
          </tr>
          <tr class="hover:bg-indigo-50/30 transition-colors group">
            <td class="px-6 py-4 flex items-center gap-3">
              <img src="https://ui-avatars.com/api/?name=James+C&background=random" class="w-9 h-9 rounded-full">
              <div>
                <div class="font-medium text-slate-800">James Cameron</div>
                <div class="text-xs text-slate-500">james.c&#64;example.com</div>
              </div>
            </td>
            <td class="px-6 py-4"><span
                class="px-2 py-1 rounded-full text-xs font-semibold bg-amber-100 text-amber-600">Pending</span>
            </td>
            <td class="px-6 py-4">Editor</td>
            <td class="px-6 py-4">Nov 12, 2023</td>
            <td class="px-6 py-4 text-right">
              <button class="text-slate-400 hover:text-indigo-600"><i data-lucide="more-horizontal"
                  size="18"></i></button>
            </td>
          </tr>
          <tr class="hover:bg-indigo-50/30 transition-colors group">
            <td class="px-6 py-4 flex items-center gap-3">
              <img src="https://ui-avatars.com/api/?name=Sarah+J&background=random" class="w-9 h-9 rounded-full">
              <div>
                <div class="font-medium text-slate-800">Sarah Jenkins</div>
                <div class="text-xs text-slate-500">s.jenkins&#64;example.com</div>
              </div>
            </td>
            <td class="px-6 py-4"><span
                class="px-2 py-1 rounded-full text-xs font-semibold bg-rose-100 text-rose-600">Inactive</span>
            </td>
            <td class="px-6 py-4">Viewer</td>
            <td class="px-6 py-4">Dec 01, 2023</td>
            <td class="px-6 py-4 text-right">
              <button class="text-slate-400 hover:text-indigo-600"><i data-lucide="more-horizontal"
                  size="18"></i></button>
            </td>
          </tr>
          <tr class="hover:bg-indigo-50/30 transition-colors group">
            <td class="px-6 py-4 flex items-center gap-3">
              <img src="https://ui-avatars.com/api/?name=Robert+F&background=random" class="w-9 h-9 rounded-full">
              <div>
                <div class="font-medium text-slate-800">Robert Fox</div>
                <div class="text-xs text-slate-500">r.fox&#64;example.com</div>
              </div>
            </td>
            <td class="px-6 py-4"><span
                class="px-2 py-1 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-600">Active</span>
            </td>
            <td class="px-6 py-4">Editor</td>
            <td class="px-6 py-4">Dec 15, 2023</td>
            <td class="px-6 py-4 text-right">
              <button class="text-slate-400 hover:text-indigo-600"><i data-lucide="more-horizontal"
                  size="18"></i></button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</template>
